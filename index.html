<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: çentikli telefonlarda alt/üst güvenli alanı biz yönetiyoruz -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#a3562a" />
    <meta name="description" content="Çay ocağı ve kıraathane satış, stok, kâr takibi" />

    <!-- telefona kurulunca tam ekran uygulama gibi açılsın -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Çay Ocağı" />

    <!-- göreli yollar: hem yerelde hem GitHub Pages alt dizininde çalışır -->
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- fontlar: gövde Inter (ince/okunur), başlık Sora (kalın). Çevrimdışıysa sistem fontuna düşer -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <title>Çay Ocağı POS</title>

    <!-- Açılış hatası yakalayıcı: beyaz ekran yerine hatayı ekrana yazar (telefonda teşhis için). -->
    <script>
      ;(function () {
        function goster(baslik, metin) {
          var el = document.getElementById('booterr')
          if (!el) {
            el = document.createElement('pre')
            el.id = 'booterr'
            el.style.cssText =
              'position:fixed;inset:0;margin:0;padding:16px;background:#111;color:#ff6b6b;font:12px/1.5 monospace;white-space:pre-wrap;overflow:auto;z-index:99999'
            ;(document.body || document.documentElement).appendChild(el)
          }
          el.textContent += baslik + ': ' + metin + '\n\n'
        }
        window.addEventListener('error', function (e) {
          var err = e.error
          goster('HATA', (e.message || err) + '\n' + ((err && err.stack) || e.filename + ':' + e.lineno))
        })
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason
          goster('PROMISE HATA', (r && (r.stack || r.message)) || String(r))
        })
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
